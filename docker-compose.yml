services:
  angular:
    build: .
    container_name: siteperso-angular-1
    restart: always
    volumes:
      - .:/app
      - /app/node_modules
    command: ["ng", "serve", "--host", "0.0.0.0", "--disable-host-check"]
    ports:
      - "4200:4200"
    networks:
      - web-network

networks:
  web-network:
    external: true
